name: Angular CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Build Angular
      run: npm run build -- --base-href "/TaskManagementSystem/"

    - name: Show Build Output
      run: |
        pwd
        ls -R
        ls -R dist || true   
    