<div class="container py-4">
  <form (ngSubmit)="onSubmit()" class="row g-3">
    <div class="col-12">
      <label class="form-label" for="name">Name</label>
      <input id="name" type="text" class="form-control" [(ngModel)]="profile.name" name="name">
    </div>

    <div class="col-12">
      <label class="form-label" for="email">Email</label>
      <input id="email" type="email" class="form-control" [(ngModel)]="profile.email" name="email">
    </div>

    <div class="col-12">
      <label class="form-label" for="role">Role</label>
      <input id="role" type="text" class="form-control" [(ngModel)]="profile.role" name="role">
    </div>

    <div class="col-12">
      <label class="form-label" for="score">Score</label>
      <input id="score" type="number" class="form-control" [(ngModel)]="profile.score" name="score">
    </div>

    <div class="col-12 form-check">
      <input id="isActive" class="form-check-input" type="checkbox" [(ngModel)]="profile.isActive" name="isActive">
      <label class="form-check-label" for="isActive">Is Active</label>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Submit</button>
    </div>
  </form>
</div>
